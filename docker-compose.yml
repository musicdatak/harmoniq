version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: harmoniq
      POSTGRES_PASSWORD: harmoniq
      POSTGRES_DB: harmoniq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmoniq"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://harmoniq:harmoniq@db:5432/harmoniq
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
